name: Disparo WhatsApp

on:
  push:
    paths:
      - 'disparar.txt' # O envio começa quando você edita este arquivo no GitHub

jobs:
  run-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - run: pip install gspread google-auth requests
      - name: Rodar Script
        env:
          EVOLUTION_API_KEY: ${{ secrets.EVOLUTION_API_KEY }}
        run: python main.py
